{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --border: #e2e7ef;
      --text-1: #111827;
      --text-2: #374151;
      --text-3: #6b7280;
      --font: 'Plus Jakarta Sans', sans-serif;
    }
    html, body {
      height: 100%;
      background: linear-gradient(135deg, #f4f6f9 0%, #e8edf5 100%);
      font-family: var(--font);
    }
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 56px;
      height: 56px;
      background: var(--blue);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      margin-bottom: 12px;
    }
    .login-logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-1);
    }
    .login-logo-text span { color: var(--blue); }
    .field-group {
      margin-bottom: 20px;
    }
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text-1);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .field-input::placeholder { color: #9ca3af; }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #1d4ed8; }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #dc2626;
      font-size: 13px;
    }
    .error-box ul { margin: 0; padding-left: 18px; }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon"><i class="bi bi-box-arrow-in-right"></i></div>
        <div class="login-logo-text">IBBS <span>Reports</span></div>
      </div>

      {% if form.errors %}
        <div class="error-box">
          Please correct the errors below.
        </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="field-group">
          <label class="field-label" for="id_username">Username</label>
          <input type="text" name="username" id="id_username" class="field-input" placeholder="Enter your username" required autofocus />
        </div>
        <div class="field-group">
          <label class="field-label" for="id_password">Password</label>
          <input type="password" name="password" id="id_password" class="field-input" placeholder="Enter your password" required />
        </div>
        <input type="hidden" name="next" value="{{ next }}" />
        <button type="submit" class="btn-login">Log In</button>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
